# Custom rules
windowrule {
    name = rule-53
    match:class = ^([Cc]hromium)$
    tile = yes
}
windowrule {
    name = rule-54
    match:class = ^(com.network.manager)$
    float = yes
    size = 25% 55%
}
windowrule {
    name = rule-55
    match:class = ^([Vv]esktop|[Dd]iscord|[Ss]potify)$
    workspace = special:nyx
}

# Some special override rules
windowrule {
    name = rule-56
    match:tag = multimedia_video*
    no_blur = yes
    opacity = 1.0
}


# POSITION
windowrule {
    name = rule-57
    match:tag = KooL_Cheat*
    center = yes
}
windowrule {
    name = rule-58
    match:class = ([Tt]hunar)
    match:title = ^(?!.*(.*[Tt]hunar.*)).*$
    center = yes
}
windowrule {
    name = rule-59
    match:title = ^(ROG Control)$
    center = yes
}
windowrule {
    name = rule-60
    match:tag = KooL-Settings*
    center = yes
}
windowrule {
    name = rule-61
    match:title = ^(Keybindings)$
    center = yes
}
windowrule {
    name = rule-62
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
    center = yes
}
windowrule {
    name = rule-63
    match:class = ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
    center = yes
}
windowrule {
    name = rule-64
    match:class = ^([Ff]erdium)$
    center = yes
}
windowrule {
    name = rule-65
    match:title = ^(Picture-in-Picture)$
    move = 61% 7%
}


# windowrule to avoid idle for fullscreen apps
# idleinhibit fullscreen rule removed - not supported in new windowrule format


# windowrule move to workspace
windowrule {
    name = rule-67
    match:tag = projects*
    workspace = 1
}
windowrule {
    name = rule-68
    match:tag = email*
    workspace = 1
}
windowrule {
    name = rule-69
    match:tag = browser*
    workspace = 2
}
windowrule {
    name = rule-70
    match:class = ^([Tt]hunar)$
    workspace = 3
}
windowrule {
    name = rule-71
    match:tag = im*
    workspace = 4
}
windowrule {
    name = rule-72
    match:tag = gamestore*
    workspace = 5
}
windowrule {
    name = rule-73
    match:tag = games*
    workspace = 8
}
windowrule {
    name = rule-74
    match:class = ^(kitty)$
    match:title = ^(tmuxifier)$
    workspace = 1
}
windowrule {
    name = rule-75
    match:class = ^(virt-viewer)$
    workspace = 9
}
windowrule {
    name = rule-76
    match:class = ^([Oo]bsidian)$
    workspace = 10
}

# windowrule move to workspace (silent)
windowrule {
    name = rule-77
    match:tag = screenshare*
    workspace = 4 silent
}
windowrule {
    name = rule-78
    match:class = ^(virt-manager)$
    workspace = 9 silent
}
windowrule {
    name = rule-79
    match:class = ^(.virt-manager-wrapped)$
    workspace = 9 silent
}
windowrule {
    name = rule-80
    match:tag = multimedia*
    workspace = 9 silent
}


