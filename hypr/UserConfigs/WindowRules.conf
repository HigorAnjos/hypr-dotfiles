# windowrule - float popups and dialogue
windowrule {
    name = rule-96
    match:title = ^(Authentication Required)$
    float = yes
    center = yes
}
windowrule {
    name = rule-97
    match:class = (codium|codium-url-handler|VSCodium)
    match:title = ^(?!.*(.*codium.*|.*VSCodium.*)).*$
    float = yes
}
windowrule {
    name = rule-98
    match:class = ^(com.heroicgameslauncher.hgl)$
    match:title = ^(?!.*(Heroic Games Launcher)).*$
    float = yes
}
windowrule {
    name = rule-99
    match:class = ^([Ss]team)$
    match:title = ^(?!.*(^([Ss]team)$)).*$
    float = yes
}
windowrule {
    name = rule-100
    match:class = ([Tt]hunar)
    match:title = ^(?!.*(.*[Tt]hunar.*)).*$
    float = yes
}
windowrule {
    name = rule-101
    match:title = ^(Add Folder to Workspace)$
    float = yes
    size = 70% 60%
    center = yes
}
windowrule {
    name = rule-102
    match:title = ^(Save As)$
    float = yes
    size = 70% 60%
    center = yes
}
windowrule {
    name = rule-103
    match:initial_title = (Open Files)
    float = yes
    size = 70% 60%
}
windowrule {
    name = rule-104
    match:title = ^(SDDM Background)$
    float = yes
    center = yes
    size = 16% 12%
}
# END of float popups and dialogue


