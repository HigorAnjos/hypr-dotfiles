# LAYER RULES
layerrule {
    name = lr-rofi-blur
    match:namespace = rofi
    blur = yes
    ignore_alpha = 0.0
}
layerrule {
    name = lr-notif-blur
    match:namespace = notifications
    blur = yes
    ignore_alpha = 0.0
}
layerrule {
    name = lr-qs-overview
    match:namespace = quickshell:overview
    blur = yes
    ignore_alpha = 0.5
}
